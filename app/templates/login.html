<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Student Performance Prediction System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
<div class="bg-decoration" aria-hidden="true"></div>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">
      <span class="brand-mark">SP</span>
      <span class="brand-name">Student Performance<br><strong>Prediction System</strong></span>
    </a>
    <div class="topbar-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="login-main">
  <div class="login-card">
    <p class="eyebrow center">Welcome back</p>
    <h1 class="login-title">Log in to your account</h1>

    <div class="role-tabs" role="tablist">
      <button class="role-tab active" data-role="admin" role="tab" aria-selected="true">Admin</button>
      <button class="role-tab" data-role="teacher" role="tab" aria-selected="false">Teacher</button>
      <button class="role-tab" data-role="student" role="tab" aria-selected="false">Student</button>
    </div>

    <form id="loginForm" class="login-form">
      <label class="field-label" for="email">Email</label>
      <input type="email" id="email" class="field-input" placeholder="you@cps.edu.np" required autocomplete="username">

      <label class="field-label" for="password">Password</label>
      <input type="password" id="password" class="field-input" placeholder="••••••••" required autocomplete="current-password">

      <div class="form-error" id="formError" hidden></div>

      <button type="submit" class="btn btn-primary btn-lg btn-block" id="submitBtn">
        <span id="submitLabel">Log in as Admin</span>
      </button>
    </form>

    <p class="login-footnote">
      Having trouble logging in? Contact your system administrator.
    </p>
  </div>
</main>

<script src="/static/js/theme.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>
